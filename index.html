<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação - 2° CANIL BAIXADA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: #fff;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('FUNDO.jpeg') no-repeat center/cover;
  filter: blur(8px);
  transform: scale(1.1);
  animation: zoomBg 20s ease-in-out infinite alternate;
  z-index: 0;
}

/* PARTÍCULAS */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 2;
}

/* CARD */
.container {
  position: relative;
  z-index: 3;
  width: 90%;
  max-width: 380px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.logo {
  width: 120px;
  border-radius: 50%;
  margin-bottom: 15px;
}

.title {
  margin-bottom: 10px;
  font-weight: 600;
}

.name {
  font-size: 20px;
  margin-top: 10px;
}

.status {
  font-size: 24px;
  font-weight: bold;
  margin-top: 10px;
}

.ativo {
  color: #00ff88;
}

.inativo {
  color: #ff4d4d;
}

.error {
  color: #ffcc00;
}

/* FULLSCREEN */
.fullscreen {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 999;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  font-weight: bold;
  text-align: center;
  animation: fadeIn 0.3s ease;
}

.green {
  background: rgba(0,255,100,0.2);
  color: #00ff88;
  box-shadow: 0 0 100px #00ff88 inset;
}

.red {
  background: rgba(255,0,0,0.2);
  color: #ff4d4d;
  box-shadow: 0 0 100px #ff0000 inset;
  animation: shake 0.4s;
}

/* ANIMAÇÕES */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  50% { transform: translateX(10px); }
  75% { transform: translateX(-10px); }
  100% { transform: translateX(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes zoomBg {
  from { transform: scale(1.1); }
  to { transform: scale(1.2); }
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="particles"></div>
<div class="overlay"></div>

<div class="container">
  <img class="logo" src="LOGO.jpeg">
  <div class="title">2° CANIL BAIXADA</div>
  <div id="result">Aguardando leitura...</div>
</div>

<!-- PARTICULAS -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
function loadParticles(color) {
  tsParticles.load("particles", {
    particles: {
      number: { value: 40 },
      color: { value: color },
      links: { enable: true, color: color, opacity: 0.2 },
      move: { enable: true, speed: 1 }
    }
  });
}

loadParticles("#ffffff");
</script>

<!-- SISTEMA -->
<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRc-Ze2QdExw43RL_ESfAnr6S9Hv_Qw61akVcWDIAlToZkANo9zn-ZACLtYMsLwFRDY52zv2DYRhBin/pub?output=csv";

function getId() {
  return new URLSearchParams(window.location.search).get("id");
}

async function loadData() {
  const result = document.getElementById("result");
  const id = getId();

  if (!id) {
    result.innerHTML = "<div class='error'>ID NÃO INFORMADO</div>";
    return;
  }

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const rows = text.split("\n").map(r => r.split(","));

    let found = false;

    rows.slice(1).forEach(row => {
      const [sheetId, nome, status] = row;

      if (sheetId === id) {
        found = true;

        const st = status.trim().toUpperCase();
        const cls = st === "ATIVO" ? "ativo" : "inativo";

        result.innerHTML = `
          <div class="name">${nome}</div>
          <div class="status ${cls}">${st}</div>
        `;

        setTimeout(() => {
          showResult(st);
        }, 800);
      }
    });

    if (!found) {
      result.innerHTML = "<div class='error'>NÃO ENCONTRADO</div>";
    }

  } catch {
    result.innerHTML = "<div class='error'>ERRO NA CONEXÃO</div>";
  }
}

function showResult(status) {
  const screen = document.createElement("div");

  if (status === "ATIVO") {
    screen.className = "fullscreen green";
    screen.innerHTML = "ACESSO LIBERADO";
    navigator.vibrate(200);
    loadParticles("#00ff88");
  } else {
    screen.className = "fullscreen red";
    screen.innerHTML = "ACESSO NEGADO";
    navigator.vibrate([100,50,100]);
    loadParticles("#ff0000");
  }

  document.body.appendChild(screen);

  setTimeout(() => {
    location.reload();
  }, 3000);
}

loadData();
</script>

</body>
</html>
