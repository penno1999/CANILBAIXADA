<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação - 2° CANIL BAIXADA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('FUNDO.jpeg') no-repeat center/cover;
  filter: blur(8px);
  transform: scale(1.1);
  animation: zoomBg 20s ease-in-out infinite alternate;
  z-index: 0;
}

#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 2;
}

.container {
  position: relative;
  z-index: 3;
  width: 90%;
  max-width: 380px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  transition: 0.4s;
}

.ativo-border { border: 2px solid #00ff88; }
.inativo-border { border: 2px solid #ffd700; }

.logo {
  width: 110px;
  border-radius: 50%;
  margin-bottom: 10px;
}

.foto {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  margin: 10px auto;
  display: block;
  border: 2px solid #fff;
}

.title {
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 10px;
  color: #fff;
}

.name {
  font-size: 20px;
  color: #fff;
}

.status {
  margin-top: 10px;
  font-size: 26px;
  font-weight: 800;
  padding: 12px;
  border-radius: 10px;
}

.ativo {
  color: #00ff88;
  background: rgba(0,255,100,0.1);
}

.inativo {
  color: #ffd700;
  background: rgba(255,215,0,0.1);
}

.error {
  color: #ffcc00;
  font-weight: bold;
}

#loading {
  color: #fff;
  margin-top: 10px;
}

.frase-box {
  position: fixed;
  bottom: 0;
  width: 100%;
  text-align: center;
  z-index: 9999;
  padding: 10px;
}

.frase-main {
  font-family: 'Permanent Marker', cursive;
  font-size: 26px;
  color: #fff;
}

.frase-sub {
  font-size: 12px;
  color: #ccc;
}

@keyframes zoomBg {
  from { transform: scale(1.1); }
  to { transform: scale(1.2); }
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="particles"></div>
<div class="overlay"></div>

<div class="container" id="card">
  <img class="logo" src="LOGO.jpeg">
  <div class="title">2° CANIL BAIXADA</div>
  <div id="loading">CARREGANDO...</div>
  <div id="result"></div>
</div>

<div class="frase-box">
  <div class="frase-main">NÃO É MODA, É TRADIÇÃO!</div>
  <div class="frase-sub">COMO NÃO SOMOS OS ÚNICOS, DECIDIMOS SER OS MELHORES!</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
let particlesLoaded = false;

function loadParticles(color) {
  if (particlesLoaded) tsParticles.domItem(0)?.destroy();

  particlesLoaded = true;

  tsParticles.load("particles", {
    fullScreen: { enable: false },
    particles: {
      number: { value: 35 },
      color: { value: color },
      links: {
        enable: true,
        color: color,
        opacity: 0.2,
        distance: 120
      },
      move: { enable: true, speed: 0.8 },
      size: { value: { min: 1, max: 3 } },
      opacity: { value: 0.4 }
    }
  });
}

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRc-Ze2QdExw43RL_ESfAnr6S9Hv_Qw61akVcWDIAlToZkANo9zn-ZACLtYMsLwFRDY52zv2DYRhBin/pub?output=csv";

function getId() {
  return new URLSearchParams(window.location.search).get("id");
}

function cleanDriveLink(url) {
  if (!url) return "";

  // já vem pronto
  if (url.includes("drive.google.com/uc?export=view")) return url.trim();

  // converter link compartilhado
  const match = url.match(/\/d\/(.*?)\//);
  if (match) {
    return `https://drive.google.com/uc?export=view&id=${match[1]}`;
  }

  return url;
}

async function loadData() {
  const result = document.getElementById("result");
  const loading = document.getElementById("loading");
  const card = document.getElementById("card");

  const id = getId();

  if (!id) {
    loading.style.display = "none";
    result.innerHTML = "<div class='error'>ID NÃO INFORMADO</div>";
    return;
  }

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    // CSV seguro (evita quebra por vírgula)
    const rows = text.trim().split("\n").map(r =>
      r.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/)
    );

    let found = false;

    for (let i = 1; i < rows.length; i++) {
      const [sheetId, nome, status, fotoRaw] = rows[i];

      if (sheetId === id) {
        found = true;

        loading.style.display = "none";

        const st = (status || "").trim().toUpperCase();
        const isAtivo = st === "ATIVO";

        const foto = cleanDriveLink((fotoRaw || "").replace(/"/g, "").trim());

        const cls = isAtivo ? "ativo" : "inativo";
        const border = isAtivo ? "ativo-border" : "inativo-border";
        const particleColor = isAtivo ? "#00ff88" : "#ffd700";

        loadParticles(particleColor);
        card.classList.add(border);

        result.innerHTML = `
          <img class="foto" src="${foto}" onerror="this.src='https://via.placeholder.com/110'">
          <div class="name">${nome}</div>
          <div class="status ${cls}">${st}</div>
        `;

        break;
      }
    }

    if (!found) {
      loading.style.display = "none";
      result.innerHTML = "<div class='error'>NÃO ENCONTRADO</div>";
    }

  } catch (e) {
    loading.style.display = "none";
    result.innerHTML = "<div class='error'>ERRO NA CONEXÃO</div>";
  }
}

loadData();
</script>

</body>
</html>
