<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação - 2° CANIL BAIXADA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* MOBILE FIX */
body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* FUNDO ANIMADO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('FUNDO.jpeg') center/cover no-repeat;
  animation: zoomBg 20s ease-in-out infinite alternate;
}

.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.35);
}

/* APP */
.app {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 420px;
  height: 90vh;
  border-radius: 30px;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.container {
  width: 90%;
  padding: 25px;
  border-radius: 22px;
  text-align: center;
  background: #111;
  animation: enter 0.4s ease-out;
}

/* LOGO */
.logo {
  width: 140px;
}

/* NOME TORCIDA */
.brand {
  font-size: 16px;
  font-weight: 700;
  margin-top: -12px;
  color: #fff;
}

/* FOTO */
.foto {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  margin: 12px auto;
}

/* NOME INTELIGENTE */
.name {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  white-space: nowrap;
}

/* TIPO */
.tipo {
  font-size: 13px;
  color: #aaa;
}

/* STATUS */
.status {
  margin-top: 10px;
  font-size: 24px;
  font-weight: 800;
}

.ativo { color: #00ff88; }
.inativo { color: #ffd700; }

.error { color: #ffcc00; }

/* 🔥 FRASE MODERNA */
.frase-box {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  z-index: 3;
}

.frase-main {
  font-family: 'Permanent Marker', cursive;
  font-size: 22px;
  color: #fff;
  animation: pulseText 2s infinite;
}

.frase-sub {
  font-size: 12px;
  color: #ccc;
  margin-top: 4px;

  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 1.5s ease forwards;
  animation-delay: 0.8s;
}

/* ANIMAÇÕES */
@keyframes enter {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes zoomBg {
  0% { transform: scale(1.05); }
  100% { transform: scale(1.15); }
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulseText {
  0% { opacity: 0.9; }
  50% { opacity: 1; }
  100% { opacity: 0.9; }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="app">
  <div class="container">

    <img class="logo" src="LOGO.jpeg">
    <div class="brand">2° CANIL BAIXADA</div>

    <div id="result"></div>

  </div>
</div>

<!-- FRASE -->
<div class="frase-box">
  <div class="frase-main">NÃO É MODA, É TRADIÇÃO!</div>
  <div class="frase-sub">COMO NÃO SOMOS OS ÚNICOS, DECIDIMOS SER OS MELHORES!</div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRc-Ze2QdExw43RL_ESfAnr6S9Hv_Qw61akVcWDIAlToZkANo9zn-ZACLtYMsLwFRDY52zv2DYRhBin/pub?output=csv";

function getId() {
  return new URLSearchParams(window.location.search).get("id");
}

/* ABREVIAÇÃO INTELIGENTE */
function ajustarNome(nome, elemento) {
  let nomeAtual = nome;

  function abreviar(nomeBase) {
    const ignorar = ["de","da","do","dos"];
    const partes = nomeBase.split(" ");

    if (partes.length <= 2) return nomeBase;

    return partes.map((p, i) => {
      if (i === 0 || i === partes.length - 1) return p;
      return ignorar.includes(p.toLowerCase()) ? p : p[0] + ".";
    }).join(" ");
  }

  elemento.innerText = nomeAtual;

  while (elemento.scrollWidth > elemento.clientWidth) {
    nomeAtual = abreviar(nomeAtual);
    elemento.innerText = nomeAtual;

    if (nomeAtual.includes(".")) break;
  }
}

async function loadData() {
  const result = document.getElementById("result");
  const id = getId();

  if (!id) {
    result.innerHTML = "<div class='error'>ID NÃO INFORMADO</div>";
    return;
  }

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(",").map(c => c.trim()));

    for (let i = 1; i < rows.length; i++) {
      const [sheetId, nome, status, foto, tipo] = rows[i];

      if (sheetId === id) {

        const st = status.toUpperCase();
        const cls = st === "ATIVO" ? "ativo" : "inativo";

        result.innerHTML = `
          <img class="foto" src="${foto}" onerror="this.src='https://via.placeholder.com/110'">
          <div class="name" id="nome"></div>
          <div class="tipo">${tipo || "MEMBRO"}</div>
          <div class="status ${cls}">${st}</div>
        `;

        const elNome = document.getElementById("nome");
        ajustarNome(nome, elNome);

        return;
      }
    }

    result.innerHTML = "<div class='error'>NÃO ENCONTRADO</div>";

  } catch {
    result.innerHTML = "<div class='error'>ERRO NA CONEXÃO</div>";
  }
}

loadData();
</script>

</body>
</html>
