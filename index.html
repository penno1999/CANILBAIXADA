<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação - 2° CANIL BAIXADA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('FUNDO.jpeg') no-repeat center/cover;
  filter: blur(8px);
  transform: scale(1.1);
  animation: zoomBg 20s ease-in-out infinite alternate;
  z-index: 0;
}

/* PARTÍCULAS */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 2;
}

/* CARD */
.container {
  position: relative;
  z-index: 3;
  width: 90%;
  max-width: 380px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  transition: 0.3s;
}

.ativo-border {
  border: 2px solid #00ff88;
}

.inativo-border {
  border: 2px solid #ffd700;
}

.logo {
  width: 110px;
  border-radius: 50%;
  margin-bottom: 10px;
}

.foto {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  margin: 10px auto;
  display: block;
  border: 2px solid #fff;
}

.title {
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 10px;
}

.name {
  font-size: 20px;
  color: #ffffff;
}

.status {
  margin-top: 10px;
  font-size: 26px;
  font-weight: 800;
  padding: 12px;
  border-radius: 10px;
}

.ativo {
  color: #00ff88;
  background: rgba(0,255,100,0.1);
}

.inativo {
  color: #ffd700;
  background: rgba(255,215,0,0.1);
}

.error {
  color: #ffcc00;
  font-weight: bold;
}

/* FRASE */
.frase-box {
  position: fixed;
  bottom: 0;
  width: 100%;
  text-align: center;
  z-index: 9999;
  padding: 10px;
}

.frase-main {
  font-family: 'Permanent Marker', cursive;
  font-size: 26px;
  color: #fff;
}

.frase-sub {
  font-size: 12px;
  color: #ccc;
}

/* ANIMAÇÃO */
@keyframes zoomBg {
  from { transform: scale(1.1); }
  to { transform: scale(1.2); }
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="particles"></div>
<div class="overlay"></div>

<div class="container" id="card">
  <img class="logo" src="LOGO.jpeg">
  <div class="title">2° CANIL BAIXADA</div>
  <div id="result"></div>
</div>

<div class="frase-box">
  <div class="frase-main">NÃO É MODA, É TRADIÇÃO!</div>
  <div class="frase-sub">COMO NÃO SOMOS OS ÚNICOS, DECIDIMOS SER OS MELHORES!</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
function loadParticles(color) {
  tsParticles.load("particles", {
    fullScreen: { enable: false },
    particles: {
      number: { value: 40 },
      color: { value: color },
      links: {
        enable: true,
        color: color,
        opacity: 0.2,
        distance: 120
      },
      move: { enable: true, speed: 1 },
      size: { value: { min: 1, max: 3 } },
      opacity: { value: 0.4 }
    }
  });
}

loadParticles("#ffffff");

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRc-Ze2QdExw43RL_ESfAnr6S9Hv_Qw61akVcWDIAlToZkANo9zn-ZACLtYMsLwFRDY52zv2DYRhBin/pub?output=csv";

function getId() {
  return new URLSearchParams(window.location.search).get("id");
}

async function loadData() {
  const result = document.getElementById("result");
  const card = document.getElementById("card");
  const id = getId();

  if (!id) {
    result.innerHTML = "<div class='error'>ID NÃO INFORMADO</div>";
    return;
  }

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const rows = text.trim().split("\n").map(r => r.split(",").map(c => c.trim()));

    let found = false;

    for (let i = 1; i < rows.length; i++) {
      const [sheetId, nome, status, foto] = rows[i];

      if (sheetId === id) {
        found = true;

        const st = status.toUpperCase();
        const cls = st === "ATIVO" ? "ativo" : "inativo";

        /* partículas */
        if (st === "ATIVO") {
          loadParticles("#00ff88");
          card.classList.add("ativo-border");
        } else {
          loadParticles("#ffd700");
          card.classList.add("inativo-border");
        }

        result.innerHTML = `
          <img class="foto" src="${foto}">
          <div class="name">${nome}</div>
          <div class="status ${cls}">${st}</div>
        `;
        break;
      }
    }

    if (!found) {
      result.innerHTML = "<div class='error'>NÃO ENCONTRADO</div>";
    }

  } catch {
    result.innerHTML = "<div class='error'>ERRO NA CONEXÃO</div>";
  }
}

loadData();
</script>

</body>
</html>
