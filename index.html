<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação - 2° CANIL BAIXADA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* FUNDO */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('FUNDO.jpeg') no-repeat center/cover;
  filter: blur(8px);
  transform: scale(1.1);
  animation: zoomBg 20s ease-in-out infinite alternate;
  z-index: 0;
}

/* PARTÍCULAS */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 2;
}

/* CARD */
.container {
  position: relative;
  z-index: 3;
  width: 90%;
  max-width: 380px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  animation: fadeIn 0.8s ease;
}

.logo {
  width: 130px;
  border-radius: 50%;
  margin-bottom: 15px;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

.title {
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 20px;
}

.name {
  font-size: 20px;
  font-weight: 500;
}

.status {
  margin-top: 15px;
  font-size: 28px;
  font-weight: 800;
  padding: 15px;
  border-radius: 12px;
  animation: pulse 1.2s infinite alternate;
}

.ativo {
  color: #00ff88;
  background: rgba(0,255,100,0.1);
  box-shadow: 0 0 25px #00ff88;
}

.inativo {
  color: #ffd700;
  background: rgba(255,215,0,0.1);
  box-shadow: 0 0 25px #ffd700;
}

.error {
  color: #ffcc00;
  font-weight: bold;
  font-size: 18px;
}

/* ANIMAÇÕES */
@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.07); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px);}
  to { opacity: 1; transform: translateY(0);}
}

@keyframes zoomBg {
  from { transform: scale(1.1); }
  to { transform: scale(1.2); }
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="particles"></div>
<div class="overlay"></div>

<div class="container">
  <img class="logo" src="LOGO.jpeg" alt="Logo">
  <div class="title">2° CANIL BAIXADA</div>
  <div id="result"></div>
</div>

<!-- PARTICULAS -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
function loadParticles(color) {
  tsParticles.load("particles", {
    fullScreen: { enable: false },
    background: { color: "transparent" },
    particles: {
      number: { value: 40 },
      color: { value: color },
      links: {
        enable: true,
        color: color,
        opacity: 0.2,
        distance: 120
      },
      move: { enable: true, speed: 1 },
      size: { value: { min: 1, max: 3 } },
      opacity: { value: 0.4 }
    }
  });
}

/* padrão branco */
loadParticles("#ffffff");
</script>

<!-- SISTEMA -->
<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRc-Ze2QdExw43RL_ESfAnr6S9Hv_Qw61akVcWDIAlToZkANo9zn-ZACLtYMsLwFRDY52zv2DYRhBin/pub?output=csv";

function getId() {
  return new URLSearchParams(window.location.search).get("id");
}

async function loadData() {
  const result = document.getElementById("result");
  const id = getId();

  if (!id) {
    result.innerHTML = "<div class='error'>ID NÃO INFORMADO</div>";
    return;
  }

  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error();

    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(",").map(c => c.trim()));

    let found = false;

    for (let i = 1; i < rows.length; i++) {
      const [sheetId, nome, status] = rows[i];

      if (sheetId === id) {
        found = true;

        const st = status.toUpperCase();
        const cls = st === "ATIVO" ? "ativo" : "inativo";

        /* 🔥 muda cor das partículas */
        if (st === "ATIVO") {
          loadParticles("#00ff88");
        } else {
          loadParticles("#ffd700");
        }

        result.innerHTML = `
          <div class="name">${nome}</div>
          <div class="status ${cls}">${st}</div>
        `;
        break;
      }
    }

    if (!found) {
      result.innerHTML = "<div class='error'>NÃO ENCONTRADO</div>";
    }

  } catch {
    result.innerHTML = "<div class='error'>ERRO NA CONEXÃO</div>";
  }
}

loadData();
</script>

</body>
</html>
