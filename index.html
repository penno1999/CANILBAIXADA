<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação - 2° CANIL BAIXADA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

/* 🔥 TELA ESTILO APP */
.app {
  width: 100%;
  max-width: 420px;
  height: 90vh;
  border-radius: 30px;
  overflow: hidden;
  background: #0a0a0a;
  box-shadow: 0 0 60px rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.container {
  width: 90%;
  padding: 25px;
  border-radius: 22px;
  text-align: center;

  background: #111;
  border: 1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.8),
    inset 0 0 15px rgba(255,255,255,0.03);

  animation: enter 0.4s ease-out;
}

/* HEADER */
.logo {
  width: 140px;
  margin-bottom: 0;
}

.brand {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  margin-top: -10px;
}

/* FOTO */
.foto {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  margin: 12px auto;
  border: 2px solid #fff;
}

/* 🔥 NOME MAIS FORTE */
.name {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.5px;
}

/* TIPO DE MEMBRO */
.tipo {
  margin-top: 5px;
  font-size: 13px;
  color: #aaa;
}

/* STATUS */
.status {
  margin-top: 12px;
  font-size: 24px;
  font-weight: 800;
  padding: 10px;
  border-radius: 12px;
}

.ativo {
  color: #00ff88;
  background: rgba(0,255,136,0.08);
}

.inativo {
  color: #ffd700;
  background: rgba(255,215,0,0.08);
}

/* ANIMAÇÕES RÁPIDAS */
@keyframes enter {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
</style>
</head>

<body>

<div class="app">
  <div class="container" id="card">

    <img class="logo" src="LOGO.jpeg">
    <div class="brand">2° CANIL BAIXADA</div>

    <div id="result"></div>

  </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRc-Ze2QdExw43RL_ESfAnr6S9Hv_Qw61akVcWDIAlToZkANo9zn-ZACLtYMsLwFRDY52zv2DYRhBin/pub?output=csv";

function getId() {
  return new URLSearchParams(window.location.search).get("id");
}

async function loadData() {
  const result = document.getElementById("result");
  const id = getId();

  if (!id) {
    result.innerHTML = "ID não informado";
    return;
  }

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const rows = text.trim().split("\n").map(r => r.split(","));

    for (let i = 1; i < rows.length; i++) {
      const [sheetId, nome, status, foto, tipo] = rows[i];

      if (sheetId === id) {

        const st = status.toUpperCase();
        const cls = st === "ATIVO" ? "ativo" : "inativo";

        result.innerHTML = `
          <img class="foto" src="${foto}">
          <div class="name">${nome}</div>
          <div class="tipo">${tipo || "MEMBRO"}</div>
          <div class="status ${cls}">${st}</div>
        `;
        return;
      }
    }

    result.innerHTML = "Não encontrado";

  } catch {
    result.innerHTML = "Erro ao carregar";
  }
}

loadData();
</script>

</body>
</html>
